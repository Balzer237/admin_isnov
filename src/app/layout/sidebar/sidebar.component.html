<div class="flex h-screen bg-primary-50">
  <!-- Overlay for mobile -->
  <div
    class="sidebar-overlay fixed inset-0 bg-black/50 backdrop-blur-sm z-30 transition-opacity duration-300"
    [class.active]="!isCollapsed && isMobile"
    (click)="isCollapsed = true"
  ></div>

  <aside
    class="fixed left-0 top-0 bottom-0 z-40 overflow-y-auto transition-all duration-300 ease-in-out transform"
    [class.collapsed]="isCollapsed"
    [class.mobile-open]="!isCollapsed && isMobile"
    [@sidebarWidth]="isCollapsed ? 'collapsed' : 'expanded'"
  >
    <!-- Sidebar Header / Logo -->
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="logo-icon flex items-center justify-center w-8 h-8 rounded-lg bg-secondary-600 shadow-md">
          <span class="text-white font-bold text-sm">BI</span>
        </div>
        <div *ngIf="!isCollapsed" class="brand-copy">
          <span class="logo-text font-heading text-sm font-semibold tracking-tight text-gray-900">Portail BI</span>
          <span class="logo-subtext">Data workspace</span>
        </div>
      </div>

      <span *ngIf="!isCollapsed" class="sidebar-badge">Core</span>

      <!-- Mobile close button -->
      <button
        *ngIf="!isCollapsed && isMobile"
        (click)="isCollapsed = true"
        class="mobile-close-button"
        aria-label="Close sidebar"
      >
        <fa-icon [icon]="faClose" class="w-5 h-5"></fa-icon>
      </button>
    </div>

    <div *ngIf="!isCollapsed" class="sidebar-intro">
      <p class="sidebar-intro-label">Navigation</p>
      <p class="sidebar-intro-text">Accédez rapidement aux espaces de configuration, données et analyse.</p>
    </div>

    <div *ngIf="!isCollapsed" class="sidebar-divider"></div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div *ngFor="let section of sections" class="sidebar-section-card">
        <!-- Section Title -->
        <div *ngIf="!isCollapsed" class="sidebar-section-title">
          <span class="section-title-dot"></span>
          <span>{{ section.title }}</span>
        </div>

        <!-- Navigation Items -->
        <div class="sidebar-items-group">
          <app-nav-item
            *ngFor="let item of section.items"
            [item]="item"
            [isCollapsed]="isCollapsed"
            [expanded]="isItemExpanded(item.id)"
            (toggle)="toggleItem($event)"
          ></app-nav-item>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main
    class="flex-1 transition-all duration-300 ease-in-out min-h-screen"
    [style.marginLeft.px]="isCollapsed ? 80 : 256"
    (click)="isMobile && !isCollapsed && (isCollapsed = true)"
  >
    <ng-content></ng-content>
  </main>
</div>
