<header class="sticky top-0 left-0 right-0 z-30 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
  <div class="h-16 px-6 flex items-center justify-between gap-6">
    <!-- Left: Breadcrumb Navigation -->
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <!-- Logo for mobile/tablet -->
      <div class="lg:hidden flex items-center">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-md">
          <span class="text-white font-bold text-xs">BI</span>
        </div>
      </div>

      <!-- Breadcrumbs -->
      <nav class="flex items-center gap-2 text-sm truncate font-sans">
        <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last">
          <a
            *ngIf="breadcrumb.route"
            [routerLink]="breadcrumb.route"
            class="text-gray-600 hover:text-blue-600 transition-colors truncate font-medium"
          >
            {{ breadcrumb.label }}
          </a>
          <span *ngIf="!breadcrumb.route" class="text-gray-900 font-semibold truncate">
            {{ breadcrumb.label }}
          </span>
          <span *ngIf="!last" class="text-gray-400 text-xs">›</span>
        </ng-container>
      </nav>
    </div>

    <!-- Center: Global Search Bar -->
    <div class="hidden md:block flex-1 max-w-md">
      <div class="relative">
        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          placeholder="Search anything..."
          class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
        />
        <kbd class="absolute right-3 top-1/2 -translate-y-1/2 hidden sm:inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium text-gray-500 bg-gray-100 border border-gray-200 rounded">
          <span class="text-xs">⌘</span>K
        </kbd>
      </div>
    </div>

    <!-- Right: Actions and User Section -->
    <div class="flex items-center gap-3">
      <!-- Mobile search toggle -->
      <button class="md:hidden p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>

      <!-- Quick Actions (Primary Button) -->
      <div class="hidden sm:block relative">
        <button
          disabled
          class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-300 text-slate-500 text-sm font-semibold transition-all shadow-sm cursor-not-allowed"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span>Create</span>
        </button>

        <!-- Quick Actions Dropdown Menu -->
        <div
          *ngIf="showQuickActionsDropdown"
          class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-xl border border-gray-200 py-2 z-50 origin-top-right transition-all"
        >
          <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">
            Quick Actions
          </div>
          <button
            (click)="openQuickAction('user')"
            class="w-full px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors text-left flex items-center gap-3"
          >
            <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <div>
              <div class="font-medium">Create User</div>
              <div class="text-xs text-gray-500">Add a new user</div>
            </div>
          </button>
          <button
            (click)="openQuickAction('report')"
            class="w-full px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors text-left flex items-center gap-3"
          >
            <div class="w-8 h-8 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
              </svg>
            </div>
            <div>
              <div class="font-medium">Create Report</div>
              <div class="text-xs text-gray-500">Generate new report</div>
            </div>
          </button>
          <button
            (click)="openQuickAction('sqlView')"
            class="w-full px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors text-left flex items-center gap-3"
          >
            <div class="w-8 h-8 rounded-lg bg-green-100 flex items-center justify-center text-green-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
              </svg>
            </div>
            <div>
              <div class="font-medium">Create SQL View</div>
              <div class="text-xs text-gray-500">Prepare a reusable query</div>
            </div>
          </button>
          <button
            (click)="openQuickAction('datasource')"
            class="w-full px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors text-left flex items-center gap-3"
          >
            <div class="w-8 h-8 rounded-lg bg-orange-100 flex items-center justify-center text-orange-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
              </svg>
            </div>
            <div>
              <div class="font-medium">Add Datasource</div>
              <div class="text-xs text-gray-500">Connect new data</div>
            </div>
          </button>
        </div>
      </div>

      <!-- User Menu -->
      <div class="relative">
        <button
          (click)="toggleUserDropdown()"
          class="flex items-center gap-2 p-1.5 hover:bg-gray-100 rounded-xl transition-all"
        >
          <span class="hidden lg:block text-sm font-medium text-gray-700">{{ getUserFirstName() }}</span>
          <svg
            class="chevron-down hidden lg:block w-4 h-4 text-gray-400 transition-transform"
            [class.open]="showUserDropdown"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- User Dropdown Menu -->
        <div
          *ngIf="showUserDropdown"
          class="absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-xl border border-gray-200 py-2 z-50 origin-top-right transition-all"
        >
          <div class="px-4 py-3 border-b border-gray-100">
            <div>
              <div class="text-sm font-semibold text-gray-900">{{ currentUser?.name }}</div>
              <div class="text-xs text-gray-500">{{ currentUser?.email }}</div>
            </div>
          </div>
          <div class="py-1">
            <a
              href="#"
              class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              Profile Settings
            </a>
            <a
              href="#"
              class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              Preferences
            </a>
            <a
              href="#"
              class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.193-.77 2.233-1.824 2.676A6.68 6.68 0 0012 18c-3.146 0-6.021-1.387-7.652-3.42A5.65 5.65 0 011.9 12c0-.62.112-1.207.324-1.748A4 4 0 014 8c0 .85.197 1.656.549 2.382A3.334 3.334 0 005 11c0 1.167.354 2.242.917 3.133A4 4 0 0110 16h1a4 4 0 01-4 4c-1.837 0-3.47-.69-4.772-1.759A6.68 6.68 0 015 16c0 3.866 3.134 7 7 7" />
              </svg>
              Help & Support
            </a>
          </div>
          <div class="border-t border-gray-100 mt-1 pt-1">
            <button
              (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
